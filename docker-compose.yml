services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: breast_cancer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@database:5432/breast_cancer
      SECRET_KEY: change-me-in-production
      BACKEND_CORS_ORIGINS: http://localhost:8501
    ports:
      - "8000:8000"
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
